<!-- right-sidebar.component.html -->
<!-- File Operations + Current Graph Info Panel -->

<aside class="right-sidebar">

  <!-- Current Graph Info -->
  <section class="sidebar-section">
    <div class="section-header">
      <div class="section-icon-box">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <h3 class="section-title">Graph Info</h3>
      <!-- Live indicator -->
      <span class="live-dot"></span>
    </div>

    <div class="info-grid">
      <div class="info-row">
        <span class="info-label">Nodes</span>
        <span class="info-value" id="infoNodes">0</span>
      </div>
      <div class="info-row">
        <span class="info-label">Edges</span>
        <span class="info-value" id="infoEdges">0</span>
      </div>
      <div class="info-row">
        <span class="info-label">Loops</span>
        <span class="info-value" id="infoLoops">0</span>
      </div>
      <div class="info-row">
        <span class="info-label">Paths</span>
        <span class="info-value" id="infoPaths">0</span>
      </div>
    </div>
  </section>

  <div class="divider"></div>

  <!-- File Operations -->
  <section class="sidebar-section">
    <div class="section-header">
      <div class="section-icon-box">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
      </div>
      <h3 class="section-title">File Operations</h3>
    </div>

    <div class="file-ops">

      <!-- Load TXT -->
      <button class="file-btn" id="loadTxtBtn" title="Load graph from .txt file">
        <div class="file-btn__icon file-btn__icon--load">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <div class="file-btn__text">
          <span class="file-btn__label">Load from File</span>
          <span class="file-btn__sub">.txt format</span>
        </div>
        <svg class="file-btn__arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      <!-- Hidden file input -->
      <input type="file" id="txtFileInput" accept=".txt" style="display:none"/>

      <!-- Export Image -->
      <button class="file-btn" id="exportImageBtn" title="Export canvas as PNG">
        <div class="file-btn__icon file-btn__icon--export">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </div>
        <div class="file-btn__text">
          <span class="file-btn__label">Export Image</span>
          <span class="file-btn__sub">PNG / SVG</span>
        </div>
        <svg class="file-btn__arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

    </div>

    <!-- TXT Format hint -->
    <div class="format-hint" id="formatHint">
      <div class="hint-header">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>TXT File Format</span>
      </div>
      <pre class="hint-code">nodes: x1,x2,x3,x4
edges:
x1->x2: G1
x2->x3: G2
x3->x4: G3
x3->x2: -H1
input: x1
output: x4</pre>
    </div>

  </section>

  <div class="divider"></div>

  <!-- Graph Status -->
  <section class="sidebar-section">
    <div class="status-block" id="graphStatus">
      <div class="status-indicator status-indicator--idle">
        <span class="status-dot"></span>
        <span class="status-text">Graph empty</span>
      </div>
    </div>
  </section>

</aside>
