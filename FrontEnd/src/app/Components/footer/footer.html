<!-- footer-toolbar.component.html -->
<footer class="footer-toolbar">

  <!-- Drawing Tools -->
  <div class="toolbar-group">

    <button class="tool-btn"
            [class.active]="activeTool === 'select'"
            (click)="selectTool('select')" title="Select (S)">
      <span class="tool-btn__icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M5 3l14 9-7 1-4 7z"/>
        </svg>
      </span>
      <span class="tool-btn__label">Select</span>
    </button>

    <button class="tool-btn"
            [class.active]="activeTool === 'move'"
            (click)="selectTool('move')" title="Move (M)">
      <span class="tool-btn__icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="5 9 2 12 5 15"/>
          <polyline points="9 5 12 2 15 5"/>
          <polyline points="15 19 12 22 9 19"/>
          <polyline points="19 9 22 12 19 15"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <line x1="12" y1="2" x2="12" y2="22"/>
        </svg>
      </span>
      <span class="tool-btn__label">Move</span>
    </button>

    <button class="tool-btn"
            [class.active]="activeTool === 'add-node'"
            (click)="selectTool('add-node')" title="Add Node (N)">
      <span class="tool-btn__icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="8"/>
          <line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
      </span>
      <span class="tool-btn__label">Add Node</span>
    </button>

    <button class="tool-btn"
            [class.active]="activeTool === 'add-branch'"
            (click)="selectTool('add-branch')" title="Add Branch (B)">
      <span class="tool-btn__icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="14 7 19 12 14 17"/>
        </svg>
      </span>
      <span class="tool-btn__label">Branch</span>
    </button>



  </div>

  <div class="toolbar-separator toolbar-separator--right"></div>
