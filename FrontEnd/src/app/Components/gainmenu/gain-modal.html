<div class="modal-backdrop" *ngIf="visible" (click)="onCancel()">
  <div class="modal-box" (click)="$event.stopPropagation()">

    <!-- Icon -->
    <div class="modal-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="#00f5ff" stroke-width="2">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="14 7 19 12 14 17"/>
      </svg>
    </div>

    <!-- Title -->
    <p class="modal-title">{{ modalTitle }}</p>

    <!-- Branch label -->
    <p class="branch-label">
      <span class="node-tag">{{ sourceNode }}</span>
      <span class="arrow-sep">→</span>
      <span class="node-tag">{{ targetNode }}</span>
    </p>

    <!-- Input -->
    <label class="input-label">Gain Value</label>
    <input
      class="gain-input-field"
      [(ngModel)]="gainValue"
      (keydown)="onKeydown($event)"
      placeholder="e.g. G1, -1, 1/s, 0.5"
      autofocus/>

    <!-- Quick presets -->
    <div class="hint-row">
      <span class="hint-chip" (click)="setQuick('1')">1</span>
      <span class="hint-chip" (click)="setQuick('-1')">-1</span>
      <span class="hint-chip" (click)="setQuick('1/s')">1/s</span>
      <span class="hint-chip" (click)="setQuick('s')">s</span>
      <span class="hint-chip" (click)="setQuick('G1')">G1</span>
      <span class="hint-chip" (click)="setQuick('H1')">H1</span>
    </div>

    <div class="divider-line"></div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn-cancel" (click)="onCancel()">Cancel</button>
      <button class="btn-ok" (click)="onConfirm()">{{ confirmLabel }}</button>
    </div>

  </div>
</div>
