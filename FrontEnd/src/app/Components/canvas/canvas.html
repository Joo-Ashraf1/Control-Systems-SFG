
<div class="canvas-wrapper">

  
  <div class="canvas-topbar">
    <div class="canvas-topbar__left">
      <span class="canvas-topbar__label">Canvas</span>
    </div>

    <div class="canvas-topbar__center">
      <div class="io-assign">
        <label class="io-assign__label">Input:</label>
        <select class="io-assign__select"
                [ngModel]="graph.inputNode"
                (ngModelChange)="onInputNodeChange($event)">
          <option value="">— select —</option>
          <option *ngFor="let id of nodeIds" [value]="id">{{ id }}</option>
        </select>
        <span class="io-assign__sep">→</span>
        <label class="io-assign__label">Output:</label>
        <select class="io-assign__select"
                [ngModel]="graph.outputNode"
                (ngModelChange)="onOutputNodeChange($event)">
          <option value="">— select —</option>
          <option *ngFor="let id of nodeIds" [value]="id">{{ id }}</option>
        </select>
      </div>
    </div>

    <div class="canvas-topbar__right">
      <div class="zoom-controls">
        <button class="zoom-btn" (click)="zoomOut()" title="Zoom Out">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <span class="zoom-level">{{ zoomPercent }}%</span>
        <button class="zoom-btn" (click)="zoomIn()" title="Zoom In">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <button class="zoom-btn" (click)="fitToScreen()" title="Fit to Screen">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  
  <div class="canvas-area">
    <div class="canvas-grid"></div>

    
    <div class="cy-container" #cyContainer></div>

    
    <div class="canvas-empty" [class.hidden]="!isEmpty">
      <div class="empty-icon">
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
          <circle cx="14" cy="28" r="6" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
          <circle cx="28" cy="14" r="6" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
          <circle cx="42" cy="28" r="6" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
          <circle cx="28" cy="42" r="6" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
          <line x1="19.5" y1="22.5" x2="23.5" y2="17.5" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
          <line x1="32.5" y1="17.5" x2="36.5" y2="22.5" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
          <line x1="38" y1="32.5" x2="34" y2="36.5" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
          <line x1="22" y1="36.5" x2="18" y2="32.5" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
        </svg>
      </div>
      <p class="empty-title">Start Building Your Signal Flow Graph</p>
      <p class="empty-subtitle">Use the toolbar below or load a .txt file</p>
      <div class="empty-hints">
        <span class="empty-hint"><kbd>Add Node</kbd> then click canvas</span>
        <span class="empty-hint"><kbd>Add Branch</kbd> then tap two nodes</span>
      </div>
    </div>
  </div>

</div>

<app-gain-modal
  [visible]="showGainModal"
  [sourceNode]="pendingSource2"
  [targetNode]="pendingTarget2"
  [initialValue]="gainModalInitialValue"
  [mode]="gainModalMode"
  (confirmed)="onGainConfirmed($event)"
  (cancelled)="onGainCancelled()">
</app-gain-modal>
