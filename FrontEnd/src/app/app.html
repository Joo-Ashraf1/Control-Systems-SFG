<div class="app-shell">

  <app-left-bar></app-left-bar>

  <div class="app-main">
    <app-canvas
      #canvasRef
      [graph]="graph"
      [activeTool]="activeTool"
      [pendingGainValue]="pendingGain"
      (graphChanged)="onGraphChanged($event)">
    </app-canvas>

    <app-footer
      [activeTool]="activeTool"
      [canUndo]="canvasRef.canUndo"
      [canRedo]="canvasRef.canRedo"
      (toolChanged)="onToolChanged($event)"
      (gainApplied)="onGainApplied($event)"
      (undoRequested)="onUndoRequested()"
      (redoRequested)="onRedoRequested()"
      (deleteRequested)="onDeleteRequested()">
    </app-footer>
  </div>

  <app-rightbar
    [graph]="graph"
    [result]="result"
    (graphLoaded)="onGraphLoaded($event)"
    (exportRequest)="onExportRequest()">
  </app-rightbar>

  <app-results-pop-up></app-results-pop-up>

</div>
